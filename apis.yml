---
aid: iit-bombay
name: Indian Institute of Technology Bombay
description: >-
  The Indian Institute of Technology Bombay (IIT Bombay), founded in 1958 and
  located in Powai, Mumbai, is one of India's premier engineering and research
  institutions, ranked #97 in the QS World University Rankings 2025. Its public
  developer footprint is largely student- and community-driven rather than a
  central institutional API program: the Students' Gymkhana operates an OAuth 2.0
  "Profiles" identity API, the Institute Technical Council runs an ITC Single
  Sign-On service, and the Central Library exposes an OAI-PMH 2.0 interface over
  its DSpace institutional repository. No unified central developer portal was
  found; access to several APIs is gated to IIT Bombay infrastructure.

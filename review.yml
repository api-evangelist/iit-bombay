  - date: '2026-06-03'
    rating: 2
    summary: >-
      IIT Bombay has no central, unified developer portal. The public API
      footprint is community- and library-driven: the Students' Gymkhana OAuth
      2.0 Profiles API (documented, but gated to IIT Bombay server
      infrastructure), the Institute Technical Council ITC SSO service
      (documented session-based auth), and a live DSpace OAI-PMH 2.0 endpoint
      over the Central Library institutional repository. All three documentation
      pages and the OAI-PMH Identify verb resolved with HTTP 200 and the OAI
      response was verified as valid OAI-PMH 2.0. No fabricated endpoints; all
      base URLs were probed live. LinkedIn returned HTTP 999 (standard bot block)
      but the school page exists.
    endpoints:
